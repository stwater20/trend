name: Update trends

on:
  schedule:
    - cron: "0 23 * * *"  # 每天 07:00 台灣時間
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trends
        run: python3 scripts/fetch_trends.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json
          git diff --cached --quiet || (git commit -m "chore: update trends $(date -u +%F)" && git push)
